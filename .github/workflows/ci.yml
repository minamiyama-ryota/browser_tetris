name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      jwt_secret:
        description: 'Optional JWT secret to override repository secret'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEBUG_VERIFY: '1'
      JWT_SECRET: ${{ github.event.inputs.jwt_secret || secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: "Debug: show workspace"
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "pwd: $(pwd)"
          echo "ls workspace:"
          ls -la "$GITHUB_WORKSPACE" || true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: pip install PyJWT

      - name: Generate JWT
        continue-on-error: true
        run: |
          set -o pipefail
          GEN_DEBUG="$GITHUB_WORKSPACE/gen_debug.txt"
          rm -f "$GEN_DEBUG" || true
          TOKEN_FILE="$GITHUB_WORKSPACE/token.txt"
          rm -f "$TOKEN_FILE" || true
          if [ -f "$GITHUB_WORKSPACE/gen_jwt_cli.py" ]; then
            # capture stdout to token file and both stdout/stderr to gen_debug (also print to log)
            python "$GITHUB_WORKSPACE/gen_jwt_cli.py" "$JWT_SECRET" > >(tee "$TOKEN_FILE") 2> >(tee -a "$GEN_DEBUG" >&2) || true
          elif [ -f "$GITHUB_WORKSPACE/elm-haskell/gen_jwt_cli.py" ]; then
            python "$GITHUB_WORKSPACE/elm-haskell/gen_jwt_cli.py" "$JWT_SECRET" > >(tee "$TOKEN_FILE") 2> >(tee -a "$GEN_DEBUG" >&2) || true
          else
            echo "gen_jwt_cli.py not found" | tee -a "$GEN_DEBUG"
            ls -la "$GITHUB_WORKSPACE" | tee -a "$GEN_DEBUG" || true
          fi
          echo "--- gen_debug (first 200 lines) ---"
          head -n 200 "$GEN_DEBUG" || true
          echo "Generated token:"
          cat "$TOKEN_FILE" || true

      - name: "Fail if token not generated"
        if: always()
        run: |
          TOKEN_FILE="$GITHUB_WORKSPACE/token.txt"
          if [ ! -s "$TOKEN_FILE" ]; then
            echo "ERROR: token.txt is missing or empty" >&2
            echo "--- gen_debug (first 200 lines) ---" >&2
            head -n 200 "$GITHUB_WORKSPACE/gen_debug.txt" 2>/dev/null || true
            echo "Workspace top-level:" >&2
            ls -la "$GITHUB_WORKSPACE" || true
            exit 1
          fi

      - name: Verify token (simple HKDF check)
        continue-on-error: true
        run: |
          set -o pipefail
          VERIFY_DEBUG="$GITHUB_WORKSPACE/verify_debug.txt"
          rm -f "$VERIFY_DEBUG" || true
          echo "VERIFY DEBUG START" | tee "$VERIFY_DEBUG"
          {
            echo "which python: $(which python)"
            echo "pwd: $(pwd)"
            echo "ls workspace top-level:"
            ls -la "$GITHUB_WORKSPACE" || true
            if [ -f "$GITHUB_WORKSPACE/elm-haskell/verify_token.py" ]; then
              echo "Using elm-haskell/verify_token.py"
              python "$GITHUB_WORKSPACE/elm-haskell/verify_token.py" "$JWT_SECRET" "$GITHUB_WORKSPACE/token.txt"
            elif [ -f "$GITHUB_WORKSPACE/verify_token.py" ]; then
              echo "Using root verify_token.py"
              python "$GITHUB_WORKSPACE/verify_token.py" "$JWT_SECRET" "$GITHUB_WORKSPACE/token.txt"
            else
              echo "verify_token.py not found under repository root or elm-haskell"
              ls -la "$GITHUB_WORKSPACE" || true
            fi
          } 2>&1 | tee -a "$VERIFY_DEBUG" || true
          echo "--- verify_debug (first 200 lines) ---"
          head -n 200 "$VERIFY_DEBUG" || true

      - name: Upload auth debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-debug
          path: |
            ${{ github.workspace }}/token.txt
            ${{ github.workspace }}/gen_debug.txt
            ${{ github.workspace }}/verify_debug.txt

      - name: "Parse gen_debug"
        if: always()
        run: |
          set -o pipefail
          GEN_DEBUG="$GITHUB_WORKSPACE/gen_debug.txt"
          REPORT="$GITHUB_WORKSPACE/gen_debug_report.json"
          if [ -f "$GEN_DEBUG" ]; then
            python "$GITHUB_WORKSPACE/tools/parse_gen_debug.py" "$GEN_DEBUG" > "$REPORT" 2>/dev/null || true
            echo "--- gen_debug_report (first 200 chars) ---"
            head -c 200 "$REPORT" || true
          else
            echo '{"error":"gen_debug not found"}' > "$REPORT"
          fi

      - name: "HKDF expectations check"
        if: always()
        run: |
          GEN_DEBUG="$GITHUB_WORKSPACE/gen_debug.txt"
          if [ -f "$GEN_DEBUG" ]; then
            echo "Running HKDF expectations check"
            python "$GITHUB_WORKSPACE/tools/check_hkdf.py" "$GEN_DEBUG"
          else
            echo "gen_debug not found; skipping HKDF check"
          fi

      - name: Upload gen_debug report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gen-debug-report
          path: ${{ github.workspace }}/gen_debug_report.json

      - name: "Append gen_debug aggregate to history"
        if: always()
        run: |
          set -o pipefail
          REPORT="$GITHUB_WORKSPACE/gen_debug_report.json"
          if [ -f "$REPORT" ]; then
            python "$GITHUB_WORKSPACE/tools/append_aggregate_to_history.py" "$REPORT" "${{ github.sha }}" || true
          else
            echo "gen_debug_report not found; skipping append"
          fi

      - name: "Generate gen_debug trend report"
        if: always()
        run: |
          set -o pipefail
          CSV="$GITHUB_WORKSPACE/tools/ci_artifacts/gen_debug_history.csv"
          OUT="$GITHUB_WORKSPACE/tools/ci_artifacts/gen_debug_trend.html"
          if [ -f "$CSV" ]; then
            python "$GITHUB_WORKSPACE/tools/gen_debug_trend.py" "$CSV" "$OUT" || true
            echo "--- trend (first 200 chars) ---"
            head -c 200 "$OUT" || true
          else
            echo "history csv not found; skipping trend generation"
          fi

      - name: "Upload gen_debug history and trend"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gen-debug-history
          path: |
            ${{ github.workspace }}/tools/ci_artifacts/gen_debug_history.csv
            ${{ github.workspace }}/tools/ci_artifacts/gen_debug_trend.html

      - name: Install system packages (for GHC/Stack)
        run: |
          # Ensure required build tools are present for GHC/stack setup
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config ca-certificates \
            zlib1g-dev libgmp-dev libncurses-dev libtinfo-dev libffi-dev curl

      - name: Install Stack (for Haskell build)
        run: |
          # install curl if missing, then install stack only if absent
          if command -v stack >/dev/null 2>&1; then
            echo "stack already installed at $(command -v stack)"
          else
            curl -sSL https://get.haskellstack.org/ | sh || true
          fi

      - name: Cache Stack and system deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            ~/.local/bin
          key: ${{ runner.os }}-stack-${{ hashFiles('**/stack.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Build & test Haskell server (with coverage)
        run: |
          if [ -d "$GITHUB_WORKSPACE/elm-haskell/haskell-server" ]; then
            cd "$GITHUB_WORKSPACE/elm-haskell/haskell-server"
          elif [ -d "$GITHUB_WORKSPACE/haskell-server" ]; then
            cd "$GITHUB_WORKSPACE/haskell-server"
          else
            echo "haskell-server directory not found"; ls -la "$GITHUB_WORKSPACE" || true; exit 1
          fi
          stack setup
          stack build --test --no-run-tests --haddock --fast
          stack test --no-terminal --coverage

      - name: Upload token artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-token
          path: ${{ github.workspace }}/token.txt

      - name: Generate HPC HTML coverage
        run: |
          set -e
          if [ -d "$GITHUB_WORKSPACE/elm-haskell/haskell-server" ]; then
            HS_DIR="$GITHUB_WORKSPACE/elm-haskell/haskell-server"
          elif [ -d "$GITHUB_WORKSPACE/haskell-server" ]; then
            HS_DIR="$GITHUB_WORKSPACE/haskell-server"
          else
            echo "haskell-server directory not found; skipping coverage markup"
            exit 0
          fi
          cd "$HS_DIR"
          TIXFILES=$(find .stack-work -name "*.tix" || true)
          if [ -z "$TIXFILES" ]; then
            echo "No .tix files found; skipping hpc markup"
            exit 0
          fi
          mkdir -p coverage
          for t in $TIXFILES; do
            stack exec -- hpc markup "$t" --destdir=coverage || true
          done
          ls -la coverage || true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hpc-coverage-html
          path: |
            ${{ github.workspace }}/elm-haskell/haskell-server/coverage
            ${{ github.workspace }}/haskell-server/coverage
