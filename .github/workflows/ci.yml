name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      jwt_secret:
        description: 'Optional JWT secret to override repository secret'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEBUG_VERIFY: '1'
      JWT_SECRET: ${{ github.event.inputs.jwt_secret || secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: "Debug: show workspace"
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "pwd: $(pwd)"
          echo "ls workspace:"
          ls -la "$GITHUB_WORKSPACE" || true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: pip install PyJWT

      - name: Generate JWT
        run: |
          GEN_DEBUG="$GITHUB_WORKSPACE/gen_debug.txt"
          rm -f "$GEN_DEBUG" || true
          if [ -f "$GITHUB_WORKSPACE/gen_jwt_cli.py" ]; then
            python "$GITHUB_WORKSPACE/gen_jwt_cli.py" "$JWT_SECRET" > "$GITHUB_WORKSPACE/token.txt" 2> "$GEN_DEBUG" || true
          elif [ -f "$GITHUB_WORKSPACE/elm-haskell/gen_jwt_cli.py" ]; then
            python "$GITHUB_WORKSPACE/elm-haskell/gen_jwt_cli.py" "$JWT_SECRET" > "$GITHUB_WORKSPACE/token.txt" 2> "$GEN_DEBUG" || true
          else
            echo "gen_jwt_cli.py not found"; ls -la "$GITHUB_WORKSPACE" || true; exit 1
          fi
          echo "--- gen_debug (first 200 lines) ---"
          head -n 200 "$GEN_DEBUG" || true
          echo "Generated token:"
          cat "$GITHUB_WORKSPACE/token.txt" || true

      - name: Verify token (simple HKDF check)
        run: |
          VERIFY_DEBUG="$GITHUB_WORKSPACE/verify_debug.txt"
          rm -f "$VERIFY_DEBUG" || true
          if [ -f "$GITHUB_WORKSPACE/elm-haskell/verify_token.py" ]; then
            python "$GITHUB_WORKSPACE/elm-haskell/verify_token.py" "$JWT_SECRET" "$GITHUB_WORKSPACE/token.txt" 2> "$VERIFY_DEBUG" || true
          elif [ -f "$GITHUB_WORKSPACE/verify_token.py" ]; then
            python "$GITHUB_WORKSPACE/verify_token.py" "$JWT_SECRET" "$GITHUB_WORKSPACE/token.txt" 2> "$VERIFY_DEBUG" || true
          else
            echo "verify_token.py not found under repository root or elm-haskell"; ls -la "$GITHUB_WORKSPACE" || true; exit 1
          fi
          echo "--- verify_debug (first 200 lines) ---"
          head -n 200 "$VERIFY_DEBUG" || true

      - name: Upload auth debug
        uses: actions/upload-artifact@v4
        with:
          name: auth-debug
          path: |
            ${{ github.workspace }}/token.txt
            ${{ github.workspace }}/gen_debug.txt
            ${{ github.workspace }}/verify_debug.txt

      - name: Install Stack (for Haskell build)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config ca-certificates \
            zlib1g-dev libgmp-dev libncurses-dev libtinfo-dev libffi-dev \
            curl wget git m4 perl bison flex binutils ccache libssl-dev
          if command -v stack >/dev/null 2>&1; then
            echo "stack already installed at $(command -v stack)"
          else
            curl -sSL https://get.haskellstack.org/ | sh || true
          fi

      - name: Cache Stack and system deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            ~/.local/bin
          key: ${{ runner.os }}-stack-${{ hashFiles('**/stack.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Build & test Haskell server (with coverage)
        run: |
          if [ -d "$GITHUB_WORKSPACE/elm-haskell/haskell-server" ]; then
            cd "$GITHUB_WORKSPACE/elm-haskell/haskell-server"
          elif [ -d "$GITHUB_WORKSPACE/haskell-server" ]; then
            cd "$GITHUB_WORKSPACE/haskell-server"
          else
            echo "haskell-server directory not found"; ls -la "$GITHUB_WORKSPACE" || true; exit 1
          fi
          stack setup
          stack build --test --no-run-tests --haddock --fast
          stack test --no-terminal --coverage

      - name: Upload token artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-token
          path: ${{ github.workspace }}/token.txt

      - name: Generate HPC HTML coverage
        run: |
          set -e
          if [ -d "$GITHUB_WORKSPACE/elm-haskell/haskell-server" ]; then
            HS_DIR="$GITHUB_WORKSPACE/elm-haskell/haskell-server"
          elif [ -d "$GITHUB_WORKSPACE/haskell-server" ]; then
            HS_DIR="$GITHUB_WORKSPACE/haskell-server"
          else
            echo "haskell-server directory not found; skipping coverage markup"
            exit 0
          fi
          cd "$HS_DIR"
          TIXFILES=$(find .stack-work -name "*.tix" || true)
          if [ -z "$TIXFILES" ]; then
            echo "No .tix files found; skipping hpc markup"
            exit 0
          fi
          mkdir -p coverage
          for t in $TIXFILES; do
            stack exec -- hpc markup "$t" --destdir=coverage || true
          done
          ls -la coverage || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: hpc-coverage-html
          path: |
            ${{ github.workspace }}/elm-haskell/haskell-server/coverage
            ${{ github.workspace }}/haskell-server/coverage
