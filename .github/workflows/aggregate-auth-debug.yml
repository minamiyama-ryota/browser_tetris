name: Aggregate auth-debug

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  aggregate:
    name: Aggregate and upload auth-debug summary
    runs-on: ubuntu-latest
    env:
      LIMIT: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyJWT

      - name: Verify repository and script presence
        run: |
          echo "Repository root: $(pwd)"
          echo "Listing root files"
          ls -la
          echo "Listing tools directory (if exists)"
          ls -la tools || true
          echo "Git HEAD and branch info"
          git rev-parse --abbrev-ref HEAD || true
          git rev-parse HEAD || true
          echo "Git status (including untracked)"
          git status --porcelain --untracked-files=all || true
          if [ ! -f tools/aggregate_auth_debug.py ]; then
            echo "tools/aggregate_auth_debug.py not found in repository checkout; attempting to retrieve from known branches"
            for b in origin/ci/create-aggregate-pr origin/gen-debug-history; do
              echo "checking $b"
              if git ls-tree -r "$b" --name-only | grep -q '^tools/aggregate_auth_debug.py$'; then
                echo "found in $b; checking out file"
                git checkout "$b" -- tools/aggregate_auth_debug.py || true
                break
              fi
            done
          fi

          if [ ! -f tools/aggregate_auth_debug.py ]; then
            echo "::error::tools/aggregate_auth_debug.py not found in repository checkout or known branches"
            echo "Hint: commit the script to the default branch or ensure workflow fetches the correct ref"
            exit 2
          fi

      - name: Run aggregation
        run: |
          python tools/aggregate_auth_debug.py --limit ${{ env.LIMIT }} --out downloads-aggregate

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-debug-summary
          path: downloads-aggregate/auth_debug_summary.csv
          retention-days: 30

      # Optional: commit CSV back to repository and open PR if PUSH_GIT_TOKEN is configured
      - name: Commit CSV and create PR (optional)
        env:
          PUSH_GIT_TOKEN: ${{ secrets.PUSH_GIT_TOKEN }}
        run: |
          if [ -z "$PUSH_GIT_TOKEN" ]; then
            echo "PUSH_GIT_TOKEN not set; skipping commit/PR"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${PUSH_GIT_TOKEN}@github.com/${{ github.repository }}
          BRANCH=aggregate/auth-debug-summary-${{ github.run_id }}
          git checkout -b "$BRANCH"
          git add downloads-aggregate/auth_debug_summary.csv || true
          git commit -m "chore(ci): update auth_debug_summary.csv" || echo "no changes to commit"
          git push --set-upstream origin "$BRANCH"
          gh pr create --title "chore(ci): update auth_debug_summary.csv" --body "Nightly aggregation updated the summary CSV." --head "$BRANCH" --base main || true
